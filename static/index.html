<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Booking</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Cinema Booking</h1>
      <nav>
        <span class="user-badge" id="userBadge"></span>
        <a href="/login">Admin Login</a>
      </nav>
    </header>

    <div class="movies" id="movieList"></div>

    <div class="booking-content hidden" id="mainContent">
      <div class="screen-area">
        <div class="screen-label">Screen</div>
        <div class="screen-bar"></div>
        <div class="seat-grid" id="seatGrid"></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background: var(--available)"></div> Available</div>
          <div class="legend-item"><div class="legend-swatch" style="background: var(--held-mine)"></div> Your hold</div>
          <div class="legend-item"><div class="legend-swatch" style="background: var(--held-other)"></div> Other hold</div>
          <div class="legend-item"><div class="legend-swatch" style="background: var(--confirmed)"></div> Confirmed</div>
        </div>
      </div>
      <div id="checkoutArea"></div>
    </div>

    <script src="./script.js"></script>
    <script src="./booking.js"></script>
  </body>
</html>
