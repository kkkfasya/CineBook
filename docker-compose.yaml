services:
  redis:
    container_name: redis
    image: redis:8-alpine # switch to 8 if no behaviour change
    ports:  
      - "6379:6379"

  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment: 
      - REDIS_HOSTS=local:redis:6379 # NOTE: it's plural bruhhh
    ports:
      - "8081:8081"
    user: redis
    depends_on:
      - redis


